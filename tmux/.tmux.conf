# ---------- General ----------
# Use C-a as prefix (screen-style), keep C-b as secondary
set -g prefix C-a
bind C-a send-prefix
unbind C-b

# Start window/pane numbering at 1
set -g base-index 1
setw -g pane-base-index 1

# Renumber windows when one is closed
set -g renumber-windows on

# Increase history limit
set -g history-limit 50000

# Reduce escape delay (important for vim)
set -sg escape-time 10

# Enable mouse support
set -g mouse on

# ---------- Display ----------
# True color support
set -g default-terminal "tmux-256color"
set -ga terminal-overrides ",*256col*:Tc"

# Activity monitoring
setw -g monitor-activity on
set -g visual-activity off

# ---------- Key Bindings ----------
# Reload config
bind r source-file ~/.tmux.conf \; display "Config reloaded!"

# Split panes with | and -
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
unbind '"'
unbind %

# New window in current path
bind c new-window -c "#{pane_current_path}"

# Vim-style pane navigation
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# Resize panes with Alt-arrow (no prefix needed)
bind -n M-Left resize-pane -L 5
bind -n M-Right resize-pane -R 5
bind -n M-Up resize-pane -U 5
bind -n M-Down resize-pane -D 5

# ---------- Copy Mode ----------
# Use vim keybindings in copy mode
setw -g mode-keys vi
bind -T copy-mode-vi v send -X begin-selection

# Linux clipboard integration
if-shell "command -v xclip" {
    bind -T copy-mode-vi y send -X copy-pipe-and-cancel "xclip -selection clipboard"
}
if-shell "command -v xsel" {
    bind -T copy-mode-vi y send -X copy-pipe-and-cancel "xsel --clipboard --input"
}

# macOS clipboard integration
if-shell "command -v pbcopy" {
    bind -T copy-mode-vi y send -X copy-pipe-and-cancel "pbcopy"
}

# ---------- Status Bar ----------
set -g status-position bottom
set -g status-interval 5
set -g status-style 'bg=colour235 fg=colour137'
set -g status-left '#[fg=colour46,bold] #S '
set -g status-right '#[fg=colour244] %Y-%m-%d #[fg=colour255,bold]%H:%M '
set -g status-left-length 20
set -g status-right-length 50

# Window status
setw -g window-status-current-style 'fg=colour81 bg=colour238 bold'
setw -g window-status-current-format ' #I:#W#F '
setw -g window-status-style 'fg=colour244 bg=colour235'
setw -g window-status-format ' #I:#W#F '

# Pane borders
set -g pane-border-style 'fg=colour238'
set -g pane-active-border-style 'fg=colour46'
